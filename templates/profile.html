{% extends "base.html" %} {% block content %}
<div class="card">
  <h1>User Profile</h1>

  <div
    class="profile-header"
    style="display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem"
  >
    <div class="profile-photo">
      {% if user.profile_photo %}
      <img
        src="{{ url_for('get_image', image=user.profile_photo) }}"
        alt="Profile Photo"
        style="
          width: 150px;
          height: 150px;
          border-radius: 50%;
          object-fit: cover;
        "
      />
      {% else %}
      <img
        src="{{ url_for('static', filename='uploads/default-profile.png') }}"
        alt="Default Profile"
        style="
          width: 150px;
          height: 150px;
          border-radius: 50%;
          object-fit: cover;
        "
      />
      {% endif %}
    </div>
    <div class="profile-info">
      <p><strong>Username:</strong> {{ user[1] }}</p>
      <p><strong>Email:</strong> {{ user[2] }}</p>
      <p><strong>Phone:</strong> {{ user[4] }}</p>
    </div>
  </div>
</div>

<div class="card">
  <h2>Change Password</h2>
  <form method="POST" action="{{ url_for('change_password') }}">
    <div class="form-group">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" required />
    </div>
    <button type="submit"><i class="fas fa-key"></i> Change Password</button>
  </form>
</div>

<div class="card">
  <h2>Update Profile Photo</h2>
  <form
    method="POST"
    action="{{ url_for('upload_file') }}"
    enctype="multipart/form-data"
  >
    <div class="form-group">
      <input type="file" name="file" accept="image/*" required />
    </div>
    <button type="submit" class="btn">Upload Photo</button>
  </form>
</div>
{% endblock %}
